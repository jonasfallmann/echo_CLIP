seed: 0

model:
  name: hf-hub:mkaichristensen/echo-clip
  device: cuda

data:
  train_csv: /system/user/publicwork/fallmann/miracle/miracle/data/server/train_4class.csv
  val_csv: /system/user/publicwork/fallmann/miracle/miracle/data/server/val_4class.csv
  video_path_col: video_filename
  label_col: label
  subject_id_col: patient_id
  borderline_policy: round_up
  max_frames: 32
  frame_step: 1
  batch_size: 10
  num_workers: 4

probe:
  depth: 4
  num_heads: 16
  mlp_ratio: 4.0

optimization:
  num_epochs: 50
  multihead_kwargs:
    - name: lr1e-3_wd1e-2
      lr: 0.001
      weight_decay: 0.01
    - name: lr5e-4_wd1e-2
      lr: 0.0005
      weight_decay: 0.01
    - name: lr1e-4_wd1e-2
      lr: 0.0001
      weight_decay: 0.01
    - name: lr1e-3_wd1e-1
      lr: 0.001
      weight_decay: 0.1
    - name: lr5e-4_wd1e-1
      lr: 0.0005
      weight_decay: 0.1
    - name: lr1e-4_wd1e-1
      lr: 0.0001
      weight_decay: 0.1

logging:
  output_dir: probe_mr_outputs_grid
  use_wandb: false
  wandb_project: miracle-echo-clip-probe
  wandb_run_name: null

